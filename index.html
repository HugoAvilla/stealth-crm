<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WFE Evolution - CRM Comercial para Estética Automotiva</title>
    <meta name="description" content="Sistema CRM completo para equipes comerciais de estética automotiva. Gerencie vendas, clientes, vagas e finanças em um só lugar." />
    <meta name="author" content="WFE Evolution" />
    <meta name="theme-color" content="#000000" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />

    <!-- Apple Touch Icon (iOS Home Screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icon.png" />

    <!-- PWA Manifest (Android Home Screen) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Mobile Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CRM WFE" />

    <!-- Open Graph -->
    <meta property="og:title" content="WFE Evolution - CRM Comercial" />
    <meta property="og:description" content="Sistema CRM completo para equipes comerciais de estética automotiva." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@WFEEvolution" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <style>
        body { margin: 0; background: #0F0F0F; }
        .initial-loader {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background-color: #0F0F0F;
          z-index: 9999;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .initial-spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(216, 230, 0, 0.2);
          border-radius: 50%;
          border-top-color: #D8E600;
          animation: spin 1s ease-in-out infinite;
          margin-bottom: 16px;
        }
        .initial-text {
          color: rgba(255, 255, 255, 0.6);
          font-size: 14px;
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: .5; }
        }
      </style>
      <div class="initial-loader">
        <div class="initial-spinner"></div>
        <div class="initial-text">Carregando WFE...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
