<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WFE Evolution - CRM Comercial para Estética Automotiva</title>
    <meta name="description" content="Sistema CRM completo para equipes comerciais de estética automotiva. Gerencie vendas, clientes, vagas e finanças em um só lugar." />
    <meta name="author" content="WFE Evolution" />
    <meta name="theme-color" content="#000000" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />

    <!-- Apple Touch Icon (iOS Home Screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icon.png" />

    <!-- PWA Manifest (Android Home Screen) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Mobile Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CRM WFE" />

    <!-- Open Graph -->
    <meta property="og:title" content="WFE Evolution - CRM Comercial" />
    <meta property="og:description" content="Sistema CRM completo para equipes comerciais de estética automotiva." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@WFEEvolution" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Pre-loader Screen -->
    <div id="loader-screen">
      <style>
        #loader-screen {
          position: fixed;
          inset: 0;
          z-index: 9999;
          background-color: #000000;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
          font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          overflow: hidden;
        }

        #loader-screen.hide-loader {
          opacity: 0;
          visibility: hidden;
        }

        /* Ambient Orbs */
        .loader-orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(100px);
          opacity: 0.6;
          animation: orb-float 10s infinite alternate ease-in-out;
          z-index: 1;
        }
        .orb-1 {
          width: 400px;
          height: 400px;
          background: rgba(255, 230, 0, 0.15); /* Yellow glow */
          top: -10%;
          left: -10%;
        }
        .orb-2 {
          width: 300px;
          height: 300px;
          background: rgba(255, 255, 255, 0.1);
          bottom: -10%;
          right: -10%;
          animation-delay: -5s;
        }

        @keyframes orb-float {
          0% { transform: translate(0, 0) scale(1); }
          50% { transform: translate(5%, 5%) scale(1.1); }
          100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* Content Container */
        .loader-content {
          position: relative;
          z-index: 10;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 2rem;
        }

        /* Logo Pulse */
        .loader-logo {
          width: 280px;
          max-width: 80vw;
          height: auto;
          animation: logo-pulse 2s infinite ease-in-out;
          filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
        }

        @keyframes logo-pulse {
          0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3)); }
          50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.6)); }
          100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3)); }
        }

        /* Loading Text */
        .loader-text {
          color: rgba(255, 255, 255, 0.8);
          font-size: 1.1rem;
          font-weight: 500;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          display: flex;
          align-items: center;
          gap: 4px;
        }

        /* Dot Flashing */
        .dot-flashing {
          position: relative;
          width: 4px;
          height: 4px;
          border-radius: 2px;
          background-color: rgba(255, 255, 255, 0.8);
          animation: dot-flashing 1s infinite linear alternate;
          animation-delay: 0.5s;
          margin-left: 8px;
        }
        .dot-flashing::before, .dot-flashing::after {
          content: '';
          display: inline-block;
          position: absolute;
          top: 0;
          width: 4px;
          height: 4px;
          border-radius: 2px;
          background-color: rgba(255, 255, 255, 0.8);
          animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before {
          left: -8px;
          animation-delay: 0s;
        }
        .dot-flashing::after {
          left: 8px;
          animation-delay: 1s;
        }

        @keyframes dot-flashing {
          0% { background-color: rgba(255, 255, 255, 0.8); }
          50%, 100% { background-color: rgba(255, 255, 255, 0.2); }
        }
      </style>

      <div class="loader-orb orb-1"></div>
      <div class="loader-orb orb-2"></div>

      <div class="loader-content">
        <img src="/logo-wfe.png" alt="WFE Evolution" class="loader-logo" />
        <div class="loader-text">
          Iniciando Sistema <div class="dot-flashing"></div>
        </div>
      </div>
    </div>

    <script>
      // Mark start time for React to calculate remaining time
      window.__loaderStartTime = Date.now();
      
      // Safety timeout in case React fails to load
      setTimeout(() => {
        const loader = document.getElementById('loader-screen');
        if (loader) {
          loader.classList.add('hide-loader');
          setTimeout(() => loader.remove(), 800);
        }
      }, 15000); // 15 seconds max
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
